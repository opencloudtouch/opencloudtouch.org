name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # --- PII & Secrets Scanner ---
      - name: Scan for PII and secret leaks
        run: |
          echo "🔍 Scanning for PII and secrets..."
          ALLOWLIST=".pii-allowlist"
          FOUND=0

          # Define patterns (label:regex pairs)
          declare -a PATTERNS=(
            # Emails (excluding safe domains)
            "email:[a-zA-Z0-9._%+-]+@(?!example\.(com|org|net)|localhost|opencloudtouch\.org)[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}"
            # Hardcoded passwords/secrets in assignments
            "password:(?i)(password|passwd|pwd|secret)\s*[:=]\s*['\"][^'\"]{4,}['\"]"
            # API keys in assignments
            "api-key:(?i)(api[_-]?key|apikey|secret[_-]?key|access[_-]?token)\s*[:=]\s*['\"][^'\"]{8,}['\"]"
            # GitHub Personal Access Tokens
            "github-token:ghp_[a-zA-Z0-9]{36}"
            # GitHub OAuth / App tokens
            "github-oauth:gho_[a-zA-Z0-9]{36}"
            # GitHub App installation tokens
            "github-app:ghs_[a-zA-Z0-9]{36}"
            # OpenAI API keys
            "openai-key:sk-[a-zA-Z0-9]{32,}"
            # Private keys (PEM)
            "private-key:-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----"
            # Bearer tokens (20+ chars)
            "bearer-token:(?i)bearer\s+[a-zA-Z0-9._~+/=-]{20,}"
            # AWS Access Keys
            "aws-key:AKIA[0-9A-Z]{16}"
            # Generic high-entropy hex secrets (64+ chars, e.g. webhook secrets)
            "hex-secret:(?i)(secret|token|key)\s*[:=]\s*['\"][0-9a-f]{64,}['\"]"
          )

          while IFS= read -r file; do
            # Skip binary files, the allowlist itself, and .git
            [[ "$file" == *.png ]] || [[ "$file" == *.jpg ]] || [[ "$file" == *.svg ]] || [[ "$file" == *.woff* ]] || [[ "$file" == *.ttf ]] && continue
            [[ "$file" == "$ALLOWLIST" ]] && continue
            [[ "$file" == .git/* ]] && continue

            for entry in "${PATTERNS[@]}"; do
              label="${entry%%:*}"
              pattern="${entry#*:}"

              while IFS=: read -r lineno match; do
                # Compute SHA-256 of the finding (file:line:match)
                HASH=$(echo -n "${file}:${lineno}:${match}" | sha256sum | cut -d' ' -f1)

                # Check allowlist
                if [ -f "$ALLOWLIST" ] && grep -q "^${HASH}" "$ALLOWLIST"; then
                  echo "  ⏭️  Allowed: ${file}:${lineno} [${label}] (hash: ${HASH:0:12}...)"
                  continue
                fi

                echo "  ❌ ${label}: ${file}:${lineno}: ${match}"
                echo "     Hash to allow: ${HASH}"
                FOUND=$((FOUND + 1))
              done < <(grep -nPo "$pattern" "$file" 2>/dev/null || true)
            done
          done < <(git ls-files)

          if [ $FOUND -gt 0 ]; then
            echo ""
            echo "❌ Found $FOUND leak(s). Add hash(es) to .pii-allowlist to suppress false positives."
            exit 1
          fi
          echo "✅ No PII or secret leaks found."

      # --- Hugo Build ---
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo site
        run: hugo --minify

      # --- Markdown Lint ---
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: 'content/**/*.md'
          config: '.markdownlint.jsonc'

      # --- PHP Lint ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP syntax check
        run: |
          echo "🔍 Checking PHP syntax..."
          ERRORS=0
          for f in $(find static/api -name '*.php'); do
            if ! php -l "$f" 2>&1 | grep -q "No syntax errors"; then
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "❌ PHP syntax errors found"
            exit 1
          fi
          echo "✅ All PHP files valid"

      # --- PHP Formatter (check only) ---
      - name: Install PHP-CS-Fixer
        run: |
          curl -fsSL https://cs.symfony.com/download/php-cs-fixer-v3.phar -o php-cs-fixer
          chmod +x php-cs-fixer

      - name: Check PHP formatting
        run: |
          ./php-cs-fixer fix static/api --dry-run --diff --rules=@PSR12 --using-cache=no || {
            echo "⚠️ PHP formatting issues found. Run 'php-cs-fixer fix static/api --rules=@PSR12' locally to fix."
          }

      # --- PHP Tests ---
      - name: Run PHP tests
        run: |
          echo "🧪 Running webhook tests..."
          cd static/api/supporters
          php test-webhook.php

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /opencloudtouch.org/
