baseURL = "https://opencloudtouch.org/"
locale = "en"
title = "OpenCloudTouch"
theme = "hugo-book"
enableGitInfo = true
disablePathToLower = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
  [markup.highlight]
    style = "base16-snazzy"

[params]
  description = "Free your Bose SoundTouch speakers from the cloud"
  BookRepo = "https://github.com/opencloudtouch/opencloudtouch"
  BookToC = true
  BookSection = "docs"
  BookLogo = "/images/logo.svg"

[menu]
  [[menu.after]]
    name = "GitHub"
    url = "https://github.com/opencloudtouch/opencloudtouch"
    weight = 100
